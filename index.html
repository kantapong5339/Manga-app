<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga & Media Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container" id="dashboard-view">
        <header>
            <h1>📚 My Media Tracker</h1>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-secondary" onclick="exportBackup()">📥 แบ็คอัพข้อมูล</button>
                
                <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()">📤 นำเข้าข้อมูล</button>
                <input type="file" id="import-file" class="hidden" accept=".json" onchange="importBackup(event)">
                
                <button class="btn" onclick="openModal('add')">➕ เพิ่มเรื่องใหม่</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-title">ทั้งหมด (Total)</div><div class="stat-value">0</div></div>
            <div class="stat-card pending"><div class="stat-title">ยังไม่จบ (On Going)</div><div class="stat-value">0</div></div>
            <div class="stat-card completed"><div class="stat-title">จบแล้ว (Completed)</div><div class="stat-value">0</div></div>
        </div>

        <div class="controls-bar">
            <div class="filter-group">
                <select id="filter-type" onchange="renderDashboard()">
                    <option value="All">ทุกประเภท</option>
                    <option value="มังงะ">มังงะ</option>
                    <option value="มังฮวา">มังฮวา</option>
                    <option value="นิยาย">นิยาย</option>
                    <option value="อนิเมะ">อนิเมะ</option>
                </select>
                <select id="filter-status" onchange="renderDashboard()">
                    <option value="All">ทุกสถานะ</option>
                    <option value="ยังไม่จบ">ยังไม่จบ</option>
                    <option value="จบแล้ว">จบแล้ว</option>
                </select>
                <input type="text" id="search-bar" placeholder="🔍 ค้นหาชื่อเรื่อง หรือ แท็ก..." oninput="renderDashboard()" style="min-width: 250px;">
            </div>
            <div>
                <select id="sort-by" onchange="renderDashboard()">
                    <option value="date-desc">วันที่บันทึก (ใหม่ล่าสุด → เก่าสุด)</option>
                    <option value="date-asc">วันที่บันทึก (เก่าสุด → ใหม่ล่าสุด)</option>
                    <option value="rating-desc">คะแนน (มากสุด → น้อยสุด)</option>
                    <option value="rating-asc">คะแนน (น้อยสุด → มากสุด)</option>
                </select>
            </div>
        </div>

        <div class="manga-grid" id="manga-container">
            <div style="color: #6b7280; text-align: center; grid-column: 1 / -1; padding: 40px;">
                ยังไม่มีข้อมูลการ์ตูน...
            </div>
        </div>
    </div>

    <div class="container hidden" id="detail-view">
        <div style="margin-bottom: 20px;">
            <button class="btn btn-secondary" onclick="backToDashboard()">← กลับหน้าหลัก</button>
            <button class="btn" id="detail-edit-btn" style="float: right;" onclick="openModal('edit')">✏️ แก้ไขข้อมูล</button>
            <button class="btn" style="float: right; margin-right: 10px; background-color: #8b5cf6;" onclick="openChapterModal('add')">➕ เพิ่มรีวิวตอน</button>
        </div>

        <div class="detail-section">
            <div class="section-title">🏷️ แท็ก (Tags)</div>
            <div id="detail-tags-list"></div>
        </div>

        <div class="detail-section" id="detail-warning-section">
            <div class="section-title" style="color: #fca5a5;">⚠️ ป้ายเตือนเนื้อหา (Warning Tags)</div>
            <div class="warning-box-grid" id="detail-warning-tags-list"></div>
        </div>

        <div class="detail-section">
            <div class="section-title">⭐ รีวิวรายตอน (เรียงจากล่าสุด)</div>
            <div id="detail-chapter-list"></div>
        </div>

        <div style="margin-top: 20px; text-align:right;">
            <button class="btn btn-danger" onclick="deleteManga()">🗑️ ลบเรื่องนี้</button>
        </div>
    </div>

    <div class="modal-overlay" id="manga-modal">
        <div class="modal-container">
            <div class="modal-header">
                <h2 id="modal-title">➕ เพิ่มเรื่องใหม่</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="manga-form" onsubmit="saveMangaForm(event)">
                    <input type="hidden" id="form-id">
                    
                    <div class="form-group"><label>ชื่อเรื่อง *</label><input type="text" id="form-title" required></div>
                    
                    <div class="form-row">
                        <div class="form-group"><label>ประเภท</label><select id="form-type"><option value="มังงะ">มังงะ</option><option value="มังฮวา">มังฮวา</option><option value="นิยาย">นิยาย</option><option value="อนิเมะ">อนิเมะ</option></select></div>
                        <div class="form-group"><label>สถานะ</label><select id="form-status"><option value="ยังไม่จบ">ยังไม่จบ</option><option value="จบแล้ว">จบแล้ว</option></select></div>
                    </div>

                    <div class="form-row">
                        <div class="form-group"><label>วันที่อ่านจบ / บันทึก</label><input type="date" id="form-date"></div>
                        <div class="form-group"><label>คะแนน (0-5)</label><input type="number" id="form-rating" step="0.1" min="0" max="5"></div>
                    </div>

                    <div class="form-group"><label>รูปภาพปก (อัปโหลดจากคอม)</label><input type="file" id="form-cover" accept="image/*" onchange="handleImageUpload(event)"></div>
                    <div class="form-group"><label>ลิงก์ไปอ่านต่อ (หลัก)</label><input type="text" id="form-link"></div>
                    
                    <div class="form-group" style="background:#2d2d35; padding:10px; border-radius:6px; margin-top:-5px;">
                        <label style="font-size: 13px; color: #9ca3af;">🔗 ลิงก์สำรอง (ถ้ามี)</label>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="input-alt-link" placeholder="วางลิงก์สำรองที่นี่...">
                            <button type="button" class="btn btn-secondary" onclick="addAltLink()">เพิ่ม</button>
                        </div>
                        <div id="form-alt-links-list"></div>
                    </div>
                    <div class="form-group"><label>รีวิว / เรื่องย่อ</label><textarea id="form-review" rows="4"></textarea></div>
                    
                    <div class="form-group" style="background:#2d2d35; padding:10px; border-radius:6px;">
                        <label>แท็กทั่วไป</label>
                        <select id="input-tag" style="width:50%; display:inline;">
                            <option value="">-- เลือกแท็ก --</option>
                        </select>
                        <button type="button" class="btn btn-secondary" onclick="addTag('normal')">เพิ่มเข้าเรื่องนี้</button>
                        
                        <div style="margin-top:10px; padding-top:10px; border-top:1px solid #4b5563;">
                            <label style="font-size: 12px; color: #9ca3af;">⚙️ จัดการตัวเลือกแท็ก (พิมพ์ชื่อเพื่อเพิ่ม หรือพิมพ์ - นำหน้าเพื่อลบ)</label>
                            <div style="display:flex; gap:10px;">
                                <input type="text" id="manage-tag-normal" placeholder="เช่น Action หรือ -Action">
                                <button type="button" class="btn" style="background:#4b5563;" onclick="editMasterTags('normal')">อัปเดต</button>
                            </div>
                        </div>
                        
                        <div id="form-tags-list" style="margin-top:10px;"></div>
                    </div>

                    <div class="form-group" style="background:#451a1a; padding:10px; border-radius:6px;">
                        <label style="color:#fca5a5;">⚠️ แท็กเตือน (รุนแรง)</label>
                        <select id="input-warning-tag" style="width:50%; display:inline;">
                            <option value="">-- เลือกคำเตือน --</option>
                        </select>
                        <button type="button" class="btn btn-danger" onclick="addTag('warning')">เพิ่มเข้าเรื่องนี้</button>

                        <div style="margin-top:10px; padding-top:10px; border-top:1px solid #7f1d1d;">
                            <label style="font-size: 12px; color: #fca5a5;">⚙️ จัดการตัวเลือกแท็กเตือน (พิมพ์ชื่อเพื่อเพิ่ม หรือพิมพ์ - นำหน้าเพื่อลบ)</label>
                            <div style="display:flex; gap:10px;">
                                <input type="text" id="manage-tag-warning" placeholder="เช่น สปอยล์ หรือ -สปอยล์">
                                <button type="button" class="btn" style="background:#7f1d1d;" onclick="editMasterTags('warning')">อัปเดต</button>
                            </div>
                        </div>
                        
                        <div id="form-warning-tags-list" style="margin-top:10px;"></div>
                    </div>
                    
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" onclick="closeModal()">ยกเลิก</button>
                        <button type="submit" class="btn">บันทึก</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="chapter-modal">
        <div class="modal-container" style="max-width: 500px;">
            <div class="modal-header">
                <h2 id="chapter-modal-title">➕ เพิ่มรีวิวตอน</h2>
                <button class="modal-close" onclick="closeChapterModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="chapter-form" onsubmit="saveChapterReview(event)">
                    <div class="form-row">
                        <div class="form-group"><label>ตอนที่ * (ใส่เป็นตัวเลข)</label><input type="number" id="form-chapter-no" step="0.01" required></div>
                        <div class="form-group"><label>คะแนน (0-5)</label><input type="number" id="form-chapter-rating" step="0.1" min="0" max="5"></div>
                    </div>
                    <div class="form-group"><label>ชื่อตอน (ถ้ามี)</label><input type="text" id="form-chapter-title" placeholder="เช่น จุดเริ่มต้นของการแก้แค้น"></div>
                    <div class="form-group"><label>คอมเม้นต์ / รีวิว *</label><textarea id="form-chapter-review" rows="4" required placeholder="รู้สึกยังไงกับตอนนี้ พิมพ์เลย!"></textarea></div>
                    
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" onclick="closeChapterModal()">ยกเลิก</button>
                        <button type="submit" class="btn" style="background-color: #8b5cf6;">บันทึกรีวิว</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
